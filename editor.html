<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>MONAS Manual-Kit v1.0</title>

    <!--<link rel="stylesheet" href="assets/css/manual.css">-->
    <link rel="stylesheet" href="assets/css/tbl.css">

    <link rel="stylesheet" href="assets/codemirror/codemirror.css">
    <link rel="stylesheet" href="assets/codemirror/theme/material-darker.min.css">
    <link rel="stylesheet" href="assets/katex/katex.min.css">

    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/toolbar.css">
    <link rel="stylesheet" href="assets/css/filetree.css">
    <link rel="stylesheet" href="assets/css/tabs.css">
    <link rel="stylesheet" href="assets/css/cwheel.css">
    <link rel="stylesheet" href="assets/css/editor.css">
</head>

<body>
    <div class="editor-app">

        <div id="header"></div>
        <div id="toolbarMount"></div>
        <input type="file" id="markdownFileInput" accept=".md,.markdown,.txt" hidden>

        <div class="editor-workspace">

            <div id="filetreeMount"></div>

            <div class="editor-workarea">

                <div id="tabsMount"></div>

                <main class="editor-main">
                    <section class="editor-pane" id="editorPane">
                        <textarea id="markdownEditor" spellcheck="false"># Manual Kit

## 소개

Manual Kit는 Markdown 기반의 기술문서 작성 도구입니다.

## 시작하기

새 문서를 작성하려면 이 내용을 삭제하거나 수정하세요.
                            </textarea>
                        <div id="cwheelMount"></div>
                    </section>
                    <div id="editorDivider" class="editor-divider" role="separator" aria-label="에디터와 프리뷰 크기 조절"
                        aria-orientation="vertical" tabindex="0">
                        <div class="editor-divider-handle"></div>
                    </div>

                    <section class="preview-pane" id="previewPane">
                        <div id="preview" class="manual-preview"></div>
                    </section>
                </main>

            </div>
        </div>

        <footer class="editor-statusbar">
            <span id="cursorStatus">Ln 1, Col 1</span>
            <span id="saveStatus">Preview Ready</span>
        </footer>
    </div>

    <script src="assets/codemirror/codemirror.min.js"></script>
    <script src="assets/codemirror/mode/markdown/markdown.min.js"></script>
    <script src="assets/codemirror/addon/selection/active-line.min.js"></script>
    <script src="assets/markdown-it/markdown-it.min.js"></script>

    <script src="assets/js/header.js"></script>
    <script src="assets/js/toolbar.js"></script>
    <script src="assets/js/filetree.js"></script>
    <script src="assets/js/tabs.js"></script>
    <script src="assets/js/preprocess.js"></script>
    <script src="assets/js/cwheel.js"></script>
    <script src="assets/js/editor.js"></script>
</body>

</html>
