<div
  class="toolbar-search-panel"
  id="toolbarSearchPanel"
  role="search"
  aria-label="현재 문서에서 찾기"
  hidden
>
  <input
    type="search"
    class="toolbar-search-input"
    id="toolbarSearchInput"
    placeholder="찾기"
    autocomplete="off"
    spellcheck="false"
    aria-label="검색어"
  >

  <span
    class="toolbar-search-count"
    id="toolbarSearchCount"
    aria-live="polite"
  >0 / 0</span>

  <button
    type="button"
    class="toolbar-search-option"
    id="toolbarSearchCase"
    title="대소문자 구분"
    aria-label="대소문자 구분"
    aria-pressed="false"
  >Aa</button>

  <button
    type="button"
    class="toolbar-search-nav"
    id="toolbarSearchPrevious"
    title="이전 찾기 (Shift+Enter / Shift+F3)"
    aria-label="이전 찾기"
  >▲</button>

  <button
    type="button"
    class="toolbar-search-nav"
    id="toolbarSearchNext"
    title="다음 찾기 (Enter / F3)"
    aria-label="다음 찾기"
  >▼</button>

  <button
    type="button"
    class="toolbar-search-close"
    id="toolbarSearchClose"
    title="검색 닫기 (Esc)"
    aria-label="검색 닫기"
  >×</button>
</div>
