<div class="format-toolbar" id="formatToolbar">
  <div class="format-toolbar-group">
    <button
      type="button"
      class="format-toolbar-button format-heading-button"
      id="formatHeadingButton"
      aria-haspopup="true"
      aria-expanded="false"
      title="제목 형식"
    >
      <span id="formatHeadingLabel">Heading</span>
      <span class="format-toolbar-arrow">▾</span>
    </button>

    <div
      class="format-toolbar-menu"
      id="formatHeadingMenu"
      role="menu"
      hidden
    >
      <button type="button" role="menuitem" data-heading-level="1">
        <span class="format-heading-name">Heading 1</span>
        <span class="format-heading-mark">#</span>
      </button>
      <button type="button" role="menuitem" data-heading-level="2">
        <span class="format-heading-name">Heading 2</span>
        <span class="format-heading-mark">##</span>
      </button>
      <button type="button" role="menuitem" data-heading-level="3">
        <span class="format-heading-name">Heading 3</span>
        <span class="format-heading-mark">###</span>
      </button>
      <button type="button" role="menuitem" data-heading-level="4">
        <span class="format-heading-name">Heading 4</span>
        <span class="format-heading-mark">####</span>
      </button>
      <button type="button" role="menuitem" data-heading-level="5">
        <span class="format-heading-name">Heading 5</span>
        <span class="format-heading-mark">#####</span>
      </button>
      <button type="button" role="menuitem" data-heading-level="6">
        <span class="format-heading-name">Heading 6</span>
        <span class="format-heading-mark">######</span>
      </button>

      <div class="format-toolbar-menu-divider"></div>

      <button type="button" role="menuitem" data-heading-level="0">
        <span class="format-heading-name">Normal Text</span>
        <span class="format-heading-mark">본문</span>
      </button>
    </div>
  </div>

  <div class="format-toolbar-separator"></div>

  <div class="format-toolbar-group">
    <button type="button" class="format-toolbar-button format-icon-button" data-format-action="bold" title="굵게">
      <strong>B</strong>
    </button>
    <button type="button" class="format-toolbar-button format-icon-button" data-format-action="italic" title="기울임">
      <em>I</em>
    </button>
    <button type="button" class="format-toolbar-button format-icon-button" data-format-action="strike" title="취소선">
      <span class="format-strike-icon">S</span>
    </button>
  </div>

  <div class="format-toolbar-separator"></div>

  <div class="format-toolbar-group">
    <button type="button" class="format-toolbar-button format-icon-button" data-format-action="bullet" title="글머리 기호 목록">•</button>
    <button type="button" class="format-toolbar-button format-icon-button" data-format-action="number" title="번호 목록">1.</button>
    <button type="button" class="format-toolbar-button format-icon-button" data-format-action="task" title="체크리스트">☑</button>
  </div>

  <div class="format-toolbar-separator"></div>

  <div class="format-toolbar-group">
    <button type="button" class="format-toolbar-button format-text-button" data-format-action="quote" title="인용문">Quote</button>
    <button type="button" class="format-toolbar-button format-text-button" data-format-action="inline-code" title="인라인 코드">Code</button>
    <button type="button" class="format-toolbar-button format-text-button" data-format-action="code-block" title="코드 블록">Block</button>
  </div>

  <div class="format-toolbar-separator"></div>

  <div class="format-toolbar-group">
    <button type="button" class="format-toolbar-button format-text-button" data-format-action="link" title="링크">Link</button>
    <button type="button" class="format-toolbar-button format-text-button" data-format-action="image" title="이미지">Image</button>
  </div>
</div>
